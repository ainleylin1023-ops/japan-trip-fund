<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共同旅遊基金</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #F6F4EF;
    color: #2C2C2A;
    margin: 0;
    padding: 24px 16px 80px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .eyebrow { font-size: 13px; color: #888780; margin-bottom: 2px; }
  .title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .total-label { font-size: 13px; color: #888780; margin-bottom: 6px; }
  .total-amt { font-size: 34px; font-weight: 600; color: #0F6E56; }
  .total-grid { display: flex; gap: 20px; }
  .total-grid > div { flex: 1; }
  .total-amt.month { font-size: 26px; color: #2C2C2A; }
  .section-title { font-size: 14px; font-weight: 600; margin: 0 0 12px; }
  .week-grid { display: flex; gap: 12px; }
  .week-cell {
    flex: 1;
    background: #F6F4EF;
    border-radius: 10px;
    padding: 12px;
  }
  .week-name { font-size: 12px; color: #888780; }
  .week-amt { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .ok { color: #0F6E56; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  select, input[type=number], input[type=date] {
    height: 40px;
    border: 1px solid #D3D1C7;
    border-radius: 8px;
    padding: 0 10px;
    font-size: 15px;
    background: #fff;
    color: #2C2C2A;
  }
  select { width: 110px; }
  input[type=number] { width: 90px; }
  button {
    height: 40px;
    border-radius: 8px;
    border: 1px solid #D3D1C7;
    background: #fff;
    padding: 0 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  button:active { transform: scale(0.98); }
  button.primary { background: #0F6E56; border-color: #0F6E56; color: #fff; }
  .amt-btn.selected { background: #0F6E56; border-color: #0F6E56; color: #fff; }
  .hint { font-size: 12px; color: #888780; margin-top: 10px; }
  .status-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .status-pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: #EDEBE3;
    color: #888780;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .status-pill::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #B4B2A9;
    display: inline-block;
  }
  .status-pill.on { background: #E4F2EC; color: #0F6E56; }
  .status-pill.on::before { background: #0F6E56; }
  .status-pill.off { background: #FBEAE4; color: #B4472A; }
  .status-pill.off::before { background: #B4472A; }
  .section-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-title-row .section-title { margin: 0; }
  .week-range { font-size: 12px; color: #888780; }
  .cal-nav { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888780; }
  .cal-nav button {
    width: 28px; height: 28px; padding: 0; font-size: 15px; line-height: 1;
    border-radius: 6px; color: #2C2C2A;
  }
  .cal-legend { display: flex; gap: 16px; font-size: 12px; color: #888780; margin-bottom: 10px; }
  .cal-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot.ainley { background: #0F6E56; }
  .dot.boyfriend { background: #C98A2C; }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    font-size: 11px; color: #B4B2A9; text-align: center; margin-bottom: 6px;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day {
    aspect-ratio: 1; border-radius: 8px; background: #F6F4EF;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: 6px;
    font-size: 12px; color: #2C2C2A; position: relative; gap: 2px;
  }
  .cal-day.empty { background: transparent; }
  .cal-day .num { font-size: 12px; }
  .cal-day.today { background: #0F6E56; }
  .cal-day.today .num {
    color: #fff; font-weight: 700; width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-day.today .amt-line { color: #E4F2EC; }
  .cal-day .amt-line { font-size: 9px; line-height: 1.3; }
  .cal-day .amt-line.ainley { color: #0F6E56; }
  .cal-day .amt-line.boyfriend { color: #C98A2C; }
  .cal-day .amt-line.total { color: #2C2C2A; font-weight: 600; border-top: 1px solid #E4E2D8; margin-top: 1px; padding-top: 1px; }
  .cal-day.today .amt-line.ainley,
  .cal-day.today .amt-line.boyfriend { color: #E4F2EC; }
  .cal-day.today .amt-line.total { color: #fff; border-top-color: rgba(255,255,255,0.35); }
  .shortfall-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #EDEBE3; font-size: 14px;
  }
  .shortfall-row:last-child { border-bottom: none; }
  .shortfall-week { color: #888780; font-size: 12px; }
  .shortfall-amt { color: #B4472A; font-weight: 600; }
  .log-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #EDEBE3;
    font-size: 14px;
  }
  .log-row:last-child { border-bottom: none; }
  .log-amt { font-weight: 600; margin-right: 10px; }
  .del { color: #B4B2A9; cursor: pointer; font-size: 16px; padding: 0 4px; }
  .empty { font-size: 13px; color: #888780; padding: 8px 0; }
  #log { max-height: 260px; overflow-y: auto; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">共同旅遊基金</div>
  <div class="title">大阪旅行 · 生活費儲蓄</div>
  <div class="status-row">
    <span id="connStatus" class="status-pill">連線中…</span>
    <span id="peerStatus" class="status-pill">對方狀態未知</span>
  </div>
  <div class="row" style="margin-bottom:16px;">
    <span style="font-size:13px;color:#888780;">我是</span>
    <select id="myIdentity">
      <option value="Ainley">Ainley</option>
      <option value="Daniel">Daniel</option>
    </select>
  </div>
 
  <div class="card">
    <div class="total-grid">
      <div>
        <div class="total-label">本月累積</div>
        <div class="total-amt month" id="monthAmt">$0</div>
      </div>
      <div>
        <div class="total-label">總累積</div>
        <div class="total-amt" id="currentAmt">$0</div>
      </div>
    </div>
  </div>
 
  <div class="card" id="shortfallCard" style="display:none;">
    <div class="section-title">待補金額</div>
    <div id="shortfallList"></div>
  </div>
 
  <div class="card">
    <div class="section-title-row">
      <div class="section-title">本週進度</div>
      <div class="week-range" id="weekRange"></div>
    </div>
    <div class="week-grid" id="weekBreakdown"></div>
  </div>
 
  <div class="card">
    <div class="section-title-row">
      <div class="section-title">月曆</div>
      <div class="cal-nav">
        <button type="button" id="calPrev">‹</button>
        <span id="calLabel"></span>
        <button type="button" id="calNext">›</button>
      </div>
    </div>
    <div class="cal-legend">
      <span><i class="dot ainley"></i>Ainley</span>
      <span><i class="dot boyfriend"></i>Daniel</span>
      <span id="calMonthTotal" style="margin-left:auto;font-weight:600;color:#2C2C2A;"></span>
    </div>
    <div class="cal-weekdays">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div id="calGrid" class="cal-grid"></div>
  </div>
 
  <div class="card">
    <div class="section-title">新增存款</div>
    <div class="row">
      <select id="who">
        <option value="Ainley">Ainley</option>
        <option value="Daniel">Daniel</option>
      </select>
      <input type="date" id="entryDate">
    </div>
    <div class="row" id="amountPicker" style="margin-top:10px;">
      <button type="button" class="amt-btn" data-amt="50">$50</button>
      <button type="button" class="amt-btn" data-amt="100">$100</button>
      <button type="button" class="amt-btn" data-amt="150">$150</button>
      <button type="button" class="amt-btn" data-amt="200">$200</button>
    </div>
    <div class="row" style="margin-top:12px;">
      <button class="primary" id="add">新增紀錄</button>
    </div>
    <div class="hint">選成員、選日期、按金額，一次可以直接記一整週的 $200，不用分四筆 $50。</div>
  </div>
 
  <div class="card">
    <div class="section-title">存款紀錄</div>
    <div class="row" style="margin-bottom:12px;">
      <select id="filterWho">
        <option value="all">全部成員</option>
        <option value="Ainley">Ainley</option>
        <option value="Daniel">Daniel</option>
      </select>
    </div>
    <div id="log"></div>
  </div>
</div>
 
<script>
(function(){
  var STORAGE_KEY = 'japan-trip-fund-v1';
  var PER_PERSON_TARGET = 200;
  var state = { entries: [] };
 
  function fmt(n){ return "$" + Math.round(n).toLocaleString(); }
 
  function getWeekKey(d){
    var date = new Date(d);
    var day = date.getDay();
    var diff = date.getDate() - day + (day===0?-6:1);
    var monday = new Date(date.setDate(diff));
    return monday.toISOString().slice(0,10);
  }
 
  var FIREBASE_URL = 'https://japan-trip-fund-default-rtdb.asia-southeast1.firebasedatabase.app';
  var IDENTITY_KEY = 'japan-trip-fund-identity';
  var PRESENCE_STALE_MS = 45 * 1000; // consider someone offline if no heartbeat in 45s
 
  function setConnStatus(ok){
    var el = document.getElementById('connStatus');
    el.classList.remove('on', 'off');
    if(ok === true){ el.classList.add('on'); el.textContent = '已連線'; }
    else if(ok === false){ el.classList.add('off'); el.textContent = '連線中斷'; }
    else { el.textContent = '連線中…'; }
  }
 
  function setPeerStatus(peerName, online){
    var el = document.getElementById('peerStatus');
    el.classList.remove('on', 'off');
    if(online === null){ el.textContent = '對方狀態未知'; return; }
    if(online){ el.classList.add('on'); el.textContent = peerName + ' 在線上'; }
    else { el.classList.add('off'); el.textContent = peerName + ' 目前離線'; }
  }
 
  function otherPerson(name){ return name === 'Ainley' ? 'Daniel' : 'Ainley'; }
 
  function sendHeartbeat(){
    var me = document.getElementById('myIdentity').value;
    fetch(FIREBASE_URL + '/presence/' + encodeURIComponent(me) + '.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Date.now())
    }).then(function(){ setConnStatus(true); })
      .catch(function(){ setConnStatus(false); });
  }
 
  function checkPeer(){
    var me = document.getElementById('myIdentity').value;
    var peer = otherPerson(me);
    fetch(FIREBASE_URL + '/presence/' + encodeURIComponent(peer) + '.json')
      .then(function(res){ return res.json(); })
      .then(function(ts){
        if(!ts){ setPeerStatus(peer, false); return; }
        setPeerStatus(peer, (Date.now() - ts) < PRESENCE_STALE_MS);
      })
      .catch(function(){ /* leave last known status */ });
  }
 
  function saveLocal(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
  }
 
  function loadLocal(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ state = JSON.parse(raw); }
    } catch(e){}
  }
 
  // Adds a single entry via POST, which gets its own unique key from Firebase.
  // This never touches other entries, so two people saving at the same time can't overwrite each other.
  function addEntry(entry){
    return fetch(FIREBASE_URL + '/entries.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    })
      .then(function(res){ return res.json(); })
      .then(function(res){
        entry.id = res.name;
        state.entries.push(entry);
        saveLocal();
      })
      .catch(function(){
        // offline fallback: keep it locally with a temp id, will not sync until back online
        entry.id = 'local-' + Date.now();
        state.entries.push(entry);
        saveLocal();
      });
  }
 
  // Deletes a single entry by its Firebase key, leaving every other entry untouched.
  function deleteEntry(id){
    state.entries = state.entries.filter(function(e){ return e.id !== id; });
    saveLocal();
    if(id.indexOf('local-') === 0) return Promise.resolve();
    return fetch(FIREBASE_URL + '/entries/' + id + '.json', { method: 'DELETE' }).catch(function(){});
  }
 
  function load(){
    loadLocal();
    return fetch(FIREBASE_URL + '/entries.json')
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data && typeof data === 'object'){
          state.entries = Object.keys(data).map(function(key){
            var e = data[key];
            e.id = key;
            return e;
          });
          saveLocal();
        }
      })
      .catch(function(){ /* fall back to whatever loaded from localStorage */ });
  }
 
  function render(){
    var total = state.entries.reduce(function(s,e){ return s+e.amount; }, 0);
    document.getElementById('currentAmt').textContent = fmt(total);
 
    var now = new Date();
    var monthTotal = state.entries.reduce(function(s,e){
      if(!e.iso) return s;
      var d = new Date(e.iso);
      return (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) ? s + e.amount : s;
    }, 0);
    document.getElementById('monthAmt').textContent = fmt(monthTotal);
 
    var thisWeekKey = getWeekKey(new Date());
    var weekStart = new Date(thisWeekKey + 'T12:00:00');
    var weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    document.getElementById('weekRange').textContent =
      (weekStart.getMonth()+1) + '/' + weekStart.getDate() + ' – ' + (weekEnd.getMonth()+1) + '/' + weekEnd.getDate();
    var byPerson = { 'Ainley': 0, 'Daniel': 0 };
    state.entries.forEach(function(e){
      var entryDate = e.iso ? new Date(e.iso) : new Date();
      if(getWeekKey(entryDate) === thisWeekKey && byPerson.hasOwnProperty(e.who)){
        byPerson[e.who] += e.amount;
      }
    });
    var wb = document.getElementById('weekBreakdown');
    wb.innerHTML = Object.keys(byPerson).map(function(name){
      var amt = byPerson[name];
      var ok = amt >= PER_PERSON_TARGET;
      return '<div class="week-cell">'
        + '<div class="week-name">' + name + '</div>'
        + '<div class="week-amt' + (ok ? ' ok' : '') + '">' + fmt(amt) + ' / ' + fmt(PER_PERSON_TARGET) + '</div>'
        + '</div>';
    }).join('');
 
    var logEl = document.getElementById('log');
    var filterVal = document.getElementById('filterWho').value;
    var visible = state.entries
      .map(function(e, i){ return { e: e, realIdx: i }; })
      .filter(function(item){ return filterVal === 'all' || item.e.who === filterVal; })
      .sort(function(a, b){ return new Date(b.e.iso) - new Date(a.e.iso); });
 
    if(visible.length === 0){
      logEl.innerHTML = '<div class="empty">' + (state.entries.length === 0 ? '還沒有存款紀錄，開始記錄第一筆吧。' : '這個成員目前沒有紀錄。') + '</div>';
    } else {
      var rows = visible.map(function(item){
        var e = item.e;
        return '<div class="log-row">'
          + '<span>' + e.date + ' · ' + e.who + '</span>'
          + '<span><span class="log-amt">' + fmt(e.amount) + '</span>'
          + '<span class="del" data-id="' + e.id + '" data-armed="0">✕</span></span>'
          + '</div>';
      }).join('');
      logEl.innerHTML = rows;
      logEl.querySelectorAll('[data-id]').forEach(function(el){
        el.addEventListener('click', function(){
          var armed = el.getAttribute('data-armed') === '1';
          if(!armed){
            logEl.querySelectorAll('.del').forEach(function(d){
              d.setAttribute('data-armed', '0');
              d.textContent = '✕';
              d.style.color = '';
              d.style.fontWeight = '';
            });
            el.setAttribute('data-armed', '1');
            el.textContent = '確定刪除？';
            el.style.color = '#D85A30';
            el.style.fontWeight = '600';
            return;
          }
          var id = el.getAttribute('data-id');
          deleteEntry(id).then(render);
          render();
        });
      });
    }
    renderCalendar();
    renderShortfalls();
  }
 
  function renderShortfalls(){
    var card = document.getElementById('shortfallCard');
    var list = document.getElementById('shortfallList');
 
    if(state.entries.length === 0){ card.style.display = 'none'; return; }
 
    var earliestIso = state.entries.reduce(function(min, e){
      return (e.iso && e.iso < min) ? e.iso : min;
    }, state.entries[0].iso || new Date().toISOString());
    var cursorKey = getWeekKey(new Date(earliestIso));
    var thisWeekKey = getWeekKey(new Date());
 
    var byWeekPerson = {};
    state.entries.forEach(function(e){
      if(!e.iso) return;
      var wk = getWeekKey(new Date(e.iso));
      if(!byWeekPerson[wk]) byWeekPerson[wk] = { 'Ainley': 0, 'Daniel': 0 };
      byWeekPerson[wk][e.who] = (byWeekPerson[wk][e.who] || 0) + e.amount;
    });
 
    var rows = [];
    var cursor = new Date(cursorKey + 'T12:00:00');
    var thisWeekStart = new Date(thisWeekKey + 'T12:00:00');
    while(cursor < thisWeekStart){
      var key = cursor.toISOString().slice(0,10);
      var totals = byWeekPerson[key] || { 'Ainley': 0, 'Daniel': 0 };
      ['Ainley', 'Daniel'].forEach(function(name){
        var short = PER_PERSON_TARGET - (totals[name] || 0);
        if(short > 0){
          var wEnd = new Date(cursor); wEnd.setDate(cursor.getDate() + 6);
          rows.push({
            label: (cursor.getMonth()+1) + '/' + cursor.getDate() + '–' + (wEnd.getMonth()+1) + '/' + wEnd.getDate(),
            name: name,
            amount: short
          });
        }
      });
      cursor.setDate(cursor.getDate() + 7);
    }
 
    if(rows.length === 0){ card.style.display = 'none'; return; }
    card.style.display = '';
    list.innerHTML = rows.map(function(r){
      return '<div class="shortfall-row">'
        + '<span>' + r.name + ' <span class="shortfall-week">' + r.label + '</span></span>'
        + '<span class="shortfall-amt">還差 ' + fmt(r.amount) + '</span>'
        + '</div>';
    }).join('');
  }
 
  var calCursor = new Date();
  calCursor.setDate(1);
 
  function renderCalendar(){
    var year = calCursor.getFullYear();
    var month = calCursor.getMonth();
    document.getElementById('calLabel').textContent = year + ' 年 ' + (month + 1) + ' 月';
 
    var byDay = {};
    var monthTotal = 0;
    state.entries.forEach(function(e){
      if(!e.iso) return;
      var d = new Date(e.iso);
      if(d.getFullYear() !== year || d.getMonth() !== month) return;
      var key = d.getDate();
      if(!byDay[key]) byDay[key] = { 'Ainley': 0, 'Daniel': 0 };
      byDay[key][e.who] = (byDay[key][e.who] || 0) + e.amount;
      monthTotal += e.amount;
    });
    document.getElementById('calMonthTotal').textContent = '本月共 ' + fmt(monthTotal);
 
    var firstDay = new Date(year, month, 1);
    var startOffset = (firstDay.getDay() + 6) % 7; // Monday = 0
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var todayStr = new Date().toDateString();
 
    var cells = '';
    for(var i = 0; i < startOffset; i++){
      cells += '<div class="cal-day empty"></div>';
    }
    for(var day = 1; day <= daysInMonth; day++){
      var cellDate = new Date(year, month, day);
      var isToday = cellDate.toDateString() === todayStr;
      var marks = byDay[day];
      var lines = '';
      if(marks){
        if(marks['Ainley']) lines += '<span class="amt-line ainley">' + fmt(marks['Ainley']) + '</span>';
        if(marks['Daniel']) lines += '<span class="amt-line boyfriend">' + fmt(marks['Daniel']) + '</span>';
      }
      cells += '<div class="cal-day' + (isToday ? ' today' : '') + '">'
        + '<span class="num">' + day + '</span>'
        + lines
        + '</div>';
    }
    document.getElementById('calGrid').innerHTML = cells;
  }
 
  document.getElementById('calPrev').addEventListener('click', function(){
    calCursor.setMonth(calCursor.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', function(){
    calCursor.setMonth(calCursor.getMonth() + 1);
    renderCalendar();
  });
 
  var selectedAmount = null;
 
  document.querySelectorAll('.amt-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.amt-btn').forEach(function(b){ b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedAmount = parseFloat(btn.getAttribute('data-amt'));
    });
  });
 
  document.getElementById('add').addEventListener('click', function(){
    var who = document.getElementById('who').value;
    if(!selectedAmount){
      var picker = document.getElementById('amountPicker');
      picker.style.outline = '2px solid #D85A30';
      picker.style.borderRadius = '10px';
      setTimeout(function(){ picker.style.outline = 'none'; }, 900);
      return;
    }
    var dateInput = document.getElementById('entryDate').value;
    var d = dateInput ? new Date(dateInput + 'T12:00:00') : new Date();
    var dateStr = (d.getMonth()+1) + '/' + d.getDate();
    var entry = { who: who, amount: selectedAmount, date: dateStr, iso: d.toISOString() };
    document.querySelectorAll('.amt-btn').forEach(function(b){ b.classList.remove('selected'); });
    selectedAmount = null;
    addEntry(entry).then(render);
    render();
  });
 
  document.getElementById('filterWho').addEventListener('change', render);
 
  document.getElementById('entryDate').value = new Date().toISOString().slice(0,10);
 
  var savedIdentity = null;
  try { savedIdentity = localStorage.getItem(IDENTITY_KEY); } catch(e){}
  if(savedIdentity){ document.getElementById('myIdentity').value = savedIdentity; }
  document.getElementById('myIdentity').addEventListener('change', function(){
    try { localStorage.setItem(IDENTITY_KEY, this.value); } catch(e){}
    sendHeartbeat();
    checkPeer();
  });
 
  loadLocal();
  render();
  load().then(render);
 
  sendHeartbeat();
  checkPeer();
  setInterval(sendHeartbeat, 20000);
  setInterval(checkPeer, 20000);
})();
</script>
</body>
</html>
